agentic_loop:
  enabled: true
  max_iterations: 15
cli:
  dag_dir: dag/dags
  session_dir: data/sessions
  shell: powershell
  timeout: 30
context:
  keyword_dict_file: data/dictionary/keywords.json
  max_retrieved_results: 5
  max_snippet_length: 2000
  max_tokens: 8000
  session_dir: data/sessions
  system_prompt_file: config/sys_prompt.md
dispatcher:
  experts:
    code_gen: code_gen
    default: default
    file_ops: file_ops
    project_init: project_init
    test: test
  max_concurrent: 5
  max_retries: 2
  poll_interval: 1.0
flask:
  debug: true
  host: 0.0.0.0
  port: abc
logging:
  format: markdown
  level: DEBUG
  log_dir: data/logs
preference:
  confidence_threshold: 0.7
  learning_interval: 10
  preference_file: data/preferences/current_prefs.json
  preference_history_dir: data/preferences/preference_history
  sys_prompt_file: config/sys_prompt.md
